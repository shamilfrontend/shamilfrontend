<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Шамиль Алисултанов — фронтенд-разработчик. Vue 3, TypeScript, Nuxt. Портфолио, резюме и контакты."
    />
    <title>Шамиль Алисултанов — Frontend Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap"
    />
    <link
      rel="preload"
      as="image"
      href="/images/shamil.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <script>
      (function () {
        var storedTheme = localStorage.getItem('theme');
        var theme =
          storedTheme ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;

        var storedLocale = localStorage.getItem('locale');
        var locale = storedLocale === 'en' ? 'en' : 'ru';

        if (storedLocale !== 'ru' && storedLocale !== 'en') {
          localStorage.setItem('locale', 'ru');
        }

        document.documentElement.lang = locale;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
