<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Шамиль Алисултанов — фронтенд-разработчик. Vue 3, TypeScript, Nuxt. Портфолио, резюме и контакты."
    />
    <title>Шамиль Алисултанов — Frontend Developer</title>
    <link
      rel="preload"
      as="image"
      href="/images/shamil.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f5f8;
      }

      html[data-theme='dark'] body {
        background: #12141f;
      }

      #lcp-shell {
        pointer-events: none;
        max-width: 1240px;
        margin: 0 auto;
        padding: 12px 14px 0;
      }

      #lcp-shell img {
        display: block;
        width: 164px;
        height: 164px;
        margin: 64px auto 0;
        border-radius: 16px;
        object-fit: cover;
        background: #e8eaf2;
      }

      html[data-theme='dark'] #lcp-shell img {
        background: #252838;
      }

      @media (min-width: 1025px) {
        #lcp-shell {
          display: grid;
          grid-template-columns: 320px minmax(0, 1fr);
          padding: 26px 24px 0;
        }

        #lcp-shell img {
          grid-column: 1;
          width: 178px;
          height: 178px;
          margin: 52px auto 0;
        }
      }
    </style>
    <script>
      (function () {
        var storedTheme = localStorage.getItem('theme');
        var theme =
          storedTheme ||
          (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;

        var storedLocale = localStorage.getItem('locale');
        var locale = storedLocale === 'en' ? 'en' : 'ru';

        if (storedLocale !== 'ru' && storedLocale !== 'en') {
          localStorage.setItem('locale', 'ru');
        }

        document.documentElement.lang = locale;
      })();
    </script>
  </head>
  <body>
    <div id="lcp-shell" aria-hidden="true">
      <img
        src="/images/shamil.webp"
        alt="Шамиль Алисултанов"
        width="164"
        height="164"
        fetchpriority="high"
        decoding="async"
      />
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
